<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="index.css">
   
</head>
<body>
    <div class="scoreboard">
        <div class="logo-container">
            <img src="images/basketball.png" alt="basketball logo" class="logo">
        </div>

        <!-- HOME Section -->
        <div class="home-column">
            <h1>Team 1</h1>
            <span id="home-score-display" class="digital-text">0</span>
            <div>
                <button class="btn" onclick="homeScoreDisplay(1)">+1</button>
                <button class="btn" onclick="homeScoreDisplay(2)">+2</button>
                <button class="btn" onclick="homeScoreDisplay(3)">+3</button>
            </div>
        </div>

        <!-- Timer Section -->
        <div class="timer-container">
            <div class="timer-column">
            <div id="timer-display" class="digital-text">00:00</div>
            </div>
            <div class="timer-btn">
                <button class="control-btn start-btn"  onclick="startTimer()">Start</button>
                <button class="control-btn stop-btn"  onclick="stopTimer()">Stop</button>
                <button class="control-btn reset-btn"  onclick="resetTimer()">Reset</button>
            </div>
        </div>
        

        <!-- GUEST Section -->
        <div class="guest-column">
            <h1>Team 2</h1>
            <span id="guest-score-display" class="digital-text">0</span>
            <div>
                <button class="btn" onclick="guestScoreDisplay(1)">+1</button>
                <button class="btn" onclick="guestScoreDisplay(2)">+2</button>
                <button class="btn" onclick="guestScoreDisplay(3)">+3</button>
            </div>
        </div>
        
    </div>
    
    
    <script src="index.js"></script>
</body>
</html>
